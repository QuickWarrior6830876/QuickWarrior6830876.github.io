<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章創作者</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        /* 這裡以下都不動... */
        /* 這裡可以寫 CSS 來控制外觀 */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f5f4f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 { color: #0076ff; }
        .post {
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>歡迎來到我的空間 👋</h1>
            <p>這裡是每個人都可以分享文章與個人作品的地方。</p>
        </header>
        
        <hr>

        <main>
            <!-- 文章區域 -->
            <article class="post">
                <h2>我的第一篇網頁文章</h2>
                <p>發表日期：2026 年 7 月</p>
                <p>這是我親手寫出的第一個網頁！我正在學習如何透過寫程式來建立自己的專屬網站...</p>
            </article>

            <!-- 作品區域 -->
            <article class="post">
                <h2>作品展示：攝影/設計/專案</h2>
                <p>這裡未來可以放置你的作品圖片、敘述或連結。</p>
            </article>
        </main>
    </div>

</body>
</html>
